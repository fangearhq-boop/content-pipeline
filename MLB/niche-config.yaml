# Ballpark Banter — Niche Configuration
# This file is read by the shared engine at _engine/SKILL.md

brand_name: "Ballpark Banter"
brand_short: "BB"
content_prefix: "mlb-content"
parent_brand: "FanGear HQ"

# Photo sourcing
photo_source: "imagn"
# imagn = licensed sports photography (USA TODAY Sports Images)
#   - Search terms: ONLY player/person name + team/organization
#   - NO years, NO context, NO event names
#   - Credit: "(USA TODAY Sports Images)" or "(Imagn Images)"

# Content pillars (league-wide MLB coverage — no formal pillars)
# content_pillars: null

# Publishing
platforms:
  - x_twitter
  - facebook
timezone: "ET"
default_schedule:
  - time: "8:00 AM"
    content_type: "Overnight/west coast scores recap"
  - time: "10:30 AM"
    content_type: "Developing news / transactions"
  - time: "12:30 PM"
    content_type: "Stats / analysis / hot take"
  - time: "3:00 PM"
    content_type: "Early game previews / afternoon games"
  - time: "6:00 PM"
    content_type: "Evening game coverage"
  - time: "10:00 PM"
    content_type: "Night game results / west coast recap"

# Article config
article_word_count_min: 400
article_word_count_max: 800
article_bylines:
  - "Marcus Cole"
  - "Jake Torres"
  - "Ryan Calloway"
article_has_quick_reference: false

# GitHub Pages
github_pages_url: "https://fangearhq-boop.github.io/content-dashboards/"
github_repo: "fangearhq-boop/content-dashboards"

# Fact-check claim types
claim_priority_labels:
  1: "Dates, times, day-of-week — most error-prone"
  2: "Scores, records, win-loss, standings"
  3: "Player stats (ERA/BA/HR/WAR), contract values"
