# I Love Softball — Niche Configuration
# This file is read by the shared engine at _engine/SKILL.md

brand_name: "I Love Softball"
brand_short: "ILS"
content_prefix: "softball-content"
parent_brand: "FanGear HQ"

# Photo sourcing
photo_source: "imagn"
# imagn = licensed sports photography (USA TODAY Sports Images)
#   - Search terms: ONLY player/person name + team/organization
#   - NO years, NO context, NO event names
#   - Credit: "(USA TODAY Sports Images)" or "(Imagn Images)"

# Canva integration
canva_brand_kit_id: "kAGENnl7bLQ"

# Content pillars (softball doesn't use formal pillars)
# content_pillars: null

# Publishing
platforms:
  - x_twitter
  - facebook
timezone: "ET"
default_schedule:
  - time: "9:00 AM"
    content_type: "Lead story / breaking news"
  - time: "11:00 AM"
    content_type: "Tier 2 developing story"
  - time: "1:00 PM"
    content_type: "Thread / deep-dive"
  - time: "3:00 PM"
    content_type: "Tier 2 or Tier 3"
  - time: "5:30 PM"
    content_type: "Recap / preview"
  - time: "8:00 PM"
    content_type: "Game coverage / evergreen"

# Article config
article_word_count_min: 400
article_word_count_max: 800
article_bylines:
  - "Sarah Mitchell"
  - "Emily Rawlings"
  - "Jordan Reeves"
article_has_quick_reference: false

# GitHub Pages
github_pages_url: "https://fangearhq-boop.github.io/ilovesoftball-dashboards/"
github_repo: "fangearhq-boop/ilovesoftball-dashboards"

# Fact-check claim types
claim_priority_labels:
  1: "Dates, times, day-of-week — most error-prone"
  2: "Scores, records, historical claims"
  3: "Rankings, player stats"
