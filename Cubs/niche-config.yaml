# Chicago Cubs Fan HQ — Niche Configuration
# This file is read by the shared engine at _engine/SKILL.md

brand_name: "Chicago Cubs Fan HQ"
brand_short: "Cubs"
content_prefix: "cubs-content"
parent_brand: "FanGear HQ"

# Photo sourcing
photo_source: "none"
# none = text-only tweets, no image production pipeline

# Canva integration (not used for text-only pipeline)
# canva_brand_kit_id: null

# Content pillars (not used — story tiers drive content mix)
# content_pillars: null

# Publishing
platforms:
  - x_twitter
timezone: "CT"
default_schedule:
  - time: "7:00 AM"
    content_type: "Morning news / overnight recap"
  - time: "9:00 AM"
    content_type: "Game preview or roster update"
  - time: "11:30 AM"
    content_type: "Mid-day analysis / stat breakdown"
  - time: "2:00 PM"
    content_type: "Afternoon news / feature / bold take"
  - time: "5:00 PM"
    content_type: "Pre-game hype or evening news"
  - time: "7:30 PM"
    content_type: "In-game update or live reaction"
  - time: "9:30 PM"
    content_type: "Post-game recap (game days only)"

# Article config (disabled — Twitter-only pipeline)
article_word_count_min: 0
article_word_count_max: 0

# GitHub Pages
github_pages_url: "https://fangearhq-boop.github.io/cubs-dashboards/"
github_repo: "fangearhq-boop/cubs-dashboards"

# Fact-check claim types (MLB-specific)
claim_priority_labels:
  1: "Dates, times, day-of-week — most error-prone"
  2: "Scores, records, win-loss records, standings"
  3: "Player stats (ERA, BA, HR, WAR), contract values"
